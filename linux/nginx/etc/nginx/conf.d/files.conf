server {
	listen [::]:443 ssl;
	listen 443 ssl;
	http2 on;
	server_name files.cleberg.net;
	add_header Onion-Location "http://yt2y635dc6zyxziy5ytkfz36bmkgcxuccq3meom6qp44gjdat54wt5id.onion$request_uri" always;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	root /var/www/files/;
	autoindex on;
	location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 127.0.0.1:8082;
    server_name yt2y635dc6zyxziy5ytkfz36bmkgcxuccq3meom6qp44gjdat54wt5id.onion;
    include custom.d/basic.conf;
    root /var/www/files/;
    autoindex on;
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 80;
    listen [::]:80;
    server_name files.cleberg.net;
    return 301 https://files.cleberg.net$request_uri;
}
