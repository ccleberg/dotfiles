server {
        listen [::]:443 ssl;
        listen 443 ssl;
        http2 on;
        server_name www.zerolabs.sh;
        include custom.d/tls/ssl_engine.conf;
        include custom.d/tls/policy_strict.conf;
        ssl_certificate         /etc/letsencrypt/live/zerolabs.sh/fullchain.pem;
        ssl_certificate_key     /etc/letsencrypt/live/zerolabs.sh/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/zerolabs.sh/chain.pem;
        return 301 $scheme://zerolabs.sh$request_uri;
}


server {
        listen [::]:443 ssl;
        listen 443 ssl;
        http2 on;
        server_name zerolabs.sh;
        root /var/www/zerolabs.sh/;
        include custom.d/tls/ssl_engine.conf;
        include custom.d/tls/policy_strict.conf;
        include custom.d/basic.conf;
        ssl_certificate         /etc/letsencrypt/live/zerolabs.sh/fullchain.pem;
        ssl_certificate_key     /etc/letsencrypt/live/zerolabs.sh/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/zerolabs.sh/chain.pem;
        location / { try_files $uri $uri/ =404; }
}

server {
        listen [::]:80;
        listen 80;
        server_name www.zerolabs.sh zerolabs.sh;
        return 301 https://zerolabs.sh$request_uri;
}
