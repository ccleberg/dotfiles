server {
	listen [::]:443 ssl;
	listen 443 ssl;
	http2 on;
	server_name mz.zerolabs.sh  ltawlmsk6vhrig2awwshnduiv45anelx3thepkd6xh4n2s4jxu7wyrid.onion;
	add_header Onion-Location "http://ltawlmsk6vhrig2awwshnduiv45anelx3thepkd6xh4n2s4jxu7wyrid.onion$request_uri" always;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	location / {
		set $upstream http://127.0.0.1:3474;
		proxy_pass $upstream;
		include custom.d/reverse_proxy/basic.conf;
	}
	include custom.d/security/robots_index_only.conf;
}

server {
    listen 80;
    listen [::]:80;
    server_name mz.zerolabs.sh;
    return 301 https://mz.zerolabs.sh$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name mz.cleberg.net;
    return 301 https://mz.zerolabs.sh$request_uri;
