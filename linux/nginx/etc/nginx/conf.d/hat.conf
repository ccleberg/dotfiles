server {
	listen [::]:443 ssl;
	listen 443 ssl;
	http2 on;
	server_name hat.zerolabs.sh  jfrkztgin2ngoj2fnssc2m2j2ycpchmrhzhudaucgvaib5iqwgfxexyd.onion;
	add_header Onion-Location "http://jfrkztgin2ngoj2fnssc2m2j2ycpchmrhzhudaucgvaib5iqwgfxexyd.onion$request_uri" always;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	location / {
		set $upstream http://192.168.0.251:3991;
		proxy_pass $upstream;
		include custom.d/reverse_proxy/basic.conf;
	}
    include custom.d/security/robots_index_only.conf;
}

server {
    listen 80;
    listen [::]:80;
    server_name hat.cleberg.net;
    return 301 https://hat.zerolabs.sh$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hat.cleberg.net;

    include custom.d/tls/ssl_engine.conf;
    include custom.d/tls/certificate_files.conf;
    include custom.d/tls/policy_strict.conf;

    return 301 https://hat.zerolabs.sh$request_uri;
}
