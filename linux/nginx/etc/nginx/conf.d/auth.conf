server {
	listen 443 ssl;
	http2 on;
	server_name auth.zerolabs.sh;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
    set $upstream http://127.0.0.1:9092;
	location / {
		proxy_pass $upstream;
		include custom.d/reverse_proxy/basic.conf;
	}
	location /api/verify { proxy_pass $upstream; }
}

server {
    listen 80;
    server_name auth.zerolabs.sh;
    return 301 https://auth.zerolabs.sh$request_uri;
}
