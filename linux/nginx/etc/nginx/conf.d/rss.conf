upstream freshrss { server 127.0.0.1:8099; keepalive 64; }
server {
	listen 10045;
	server_name rss.zerolabs.sh rss.cleberg.net;

	if ($host = rss.cleberg.net) {
	    return 301 https://rss.zerolabs.sh$request_uri;
	}
	include custom.d/basic.conf;
	location / {
		proxy_pass http://freshrss/;
		add_header X-Frame-Options SAMEORIGIN;
		proxy_redirect off;
		proxy_buffering off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Port $server_port;
		proxy_read_timeout 90;
		proxy_set_header Authorization $http_authorization;
		proxy_pass_header Authorization;
	}
	include custom.d/security/robots_index_only.conf;
}

