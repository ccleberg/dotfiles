server {
	listen 443 ssl;
	http2 on;
	server_name bt.zerolabs.sh;

	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;

	location /authelia {
		include custom.d/reverse_proxy/authelia.conf;
	}

	location = / {
		include custom.d/reverse_proxy/authelia_request.conf;
		return 301 /transmission/web/;
	}

	location /transmission/ {
		include custom.d/reverse_proxy/authelia_request.conf;
		proxy_read_timeout 300;
		proxy_http_version 1.1;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
		proxy_set_header X-Forwarded-Server $host;

		proxy_pass_header X-Transmission-Session-Id;
		proxy_pass http://127.0.0.1:9091;
	}
}

server {
    listen 80;
    listen [::]:80;
    server_name bt.cleberg.net;
    return 301 https://bt.zerolabs.sh$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bt.cleberg.net;

    include custom.d/tls/ssl_engine.conf;
    include custom.d/tls/certificate_files.conf;
    include custom.d/tls/policy_strict.conf;

    return 301 https://bt.zerolabs.sh$request_uri;
}
