server {
	listen 10021;
	server_name ha.zerolabs.sh ha.cleberg.net;

	if ($host = ha.cleberg.net) {
	    return 301 https://ha.zerolabs.sh$request_uri;
	}
	include custom.d/basic.conf;
	location / {
		proxy_pass $backend_address;
		proxy_set_header X-Forwarded-For $remote_addr;
	}
	location /api/websocket {
		proxy_pass $backend_address;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
	include custom.d/security/robots_index_only.conf;
}

