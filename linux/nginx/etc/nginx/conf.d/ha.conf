server {
	listen 443 ssl;
	http2 on;
	server_name ha.zerolabs.sh;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files_cleberg_net.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	location / {
		proxy_pass $backend_address;
		proxy_set_header X-Forwarded-For $remote_addr;
	}
	location /api/websocket {
		proxy_pass $backend_address;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
	include custom.d/security/robots_index_only.conf;
}

server {
    listen 80;
    server_name ha.zerolabs.sh;
    return 301 https://ha.zerolabs.sh$request_uri;
}
