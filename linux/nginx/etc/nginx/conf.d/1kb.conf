server {
    listen 443;
    http2 on;
    server_name 1kb.cleberg.net;

    root /var/www/1kb;
    index index.html;

    server_tokens off;
    etag off;
    if_modified_since off;
    expires off;
    gzip off;
    gzip_vary off;
    charset off;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }
}
