server {
    listen 10001;
    server_name 1kb.zerolabs.sh 1kb.cleberg.net;

    if ($host = 1kb.cleberg.net) {
        return 301 https://1kb.zerolabs.sh$request_uri;
    }

    root /var/www/1kb;
    index index.html;

    server_tokens off;
    etag off;
    if_modified_since off;
    expires off;
    gzip off;
    gzip_vary off;
    charset off;


    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }
}

