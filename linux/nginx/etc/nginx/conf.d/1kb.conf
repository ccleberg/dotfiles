server {
    listen 443 ssl;
    http2 on;
    server_name 1kb.zerolabs.sh;

    if ($host = 1kb.cleberg.net) {
        return 301 https://1kb.zerolabs.sh$request_uri;
    }

    root /var/www/1kb;
    index index.html;

    server_tokens off;
    etag off;
    if_modified_since off;
    expires off;
    gzip off;
    gzip_vary off;
    charset off;

    include custom.d/tls/ssl_engine.conf;
    include custom.d/tls/certificate_files_zerolabs_sh.conf;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    server_name 1kb.zerolabs.sh 1kb.cleberg.net;
    return 301 https://1kb.zerolabs.sh$request_uri;
}
