server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1kb.cleberg.net;

    root /var/www/1kb;
    index index.html;

    server_tokens off;
    etag off;
    if_modified_since off;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }
}
