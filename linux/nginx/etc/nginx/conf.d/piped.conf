server {
	listen [::]:443 ssl;
	listen 443 ssl;
	http2 on;
	server_name piped.zerolabs.sh pipedapi.zerolabs.sh pipedproxy.zerolabs.sh  5ttqjwhhcxh7apxrge5b5cjqceiibrjlqv2hhtmukwfsitbzqk5hh4id.onion;
	add_header Onion-Location "http://5ttqjwhhcxh7apxrge5b5cjqceiibrjlqv2hhtmukwfsitbzqk5hh4id.onion$request_uri" always;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	location / {
		set $upstream http://127.0.0.1:8077;
		proxy_pass $upstream;
		proxy_set_header Host $host;
	}
	include custom.d/security/robots_index_only.conf;
}

server {
    listen 80;
    listen [::]:80;
    server_name pipedapi.zerolabs.sh;
    return 301 https://pipedapi.zerolabs.sh$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name piped.cleberg.net pipedapi.cleberg.net pipedproxy.cleberg.net;
    return 301 https://pipedapi.zerolabs.sh$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name piped.cleberg.net pipedapi.cleberg.net pipedproxy.cleberg.net;

    include custom.d/tls/ssl_engine.conf;
    include custom.d/tls/certificate_files.conf;
    include custom.d/tls/policy_strict.conf;

    return 301 https://pipedapi.zerolabs.sh$request_uri;
}
