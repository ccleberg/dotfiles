server {
	listen [::]:443 ssl;
	listen 443 ssl;
	http2 on;
	server_name piped.cleberg.net pipedapi.cleberg.net pipedproxy.cleberg.net  5ttqjwhhcxh7apxrge5b5cjqceiibrjlqv2hhtmukwfsitbzqk5hh4id.onion;
	add_header Onion-Location "http://5ttqjwhhcxh7apxrge5b5cjqceiibrjlqv2hhtmukwfsitbzqk5hh4id.onion$request_uri" always;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	location / {
		set $upstream http://127.0.0.1:8077;
		proxy_pass $upstream;
		proxy_set_header Host $host;
	}
	include custom.d/security/robots_index_only.conf;
}