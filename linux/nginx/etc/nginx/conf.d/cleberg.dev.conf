server {
        listen 443 ssl;
        http2 on;
        server_name www.cleberg.dev;
        include custom.d/tls/ssl_engine.conf;
        include custom.d/tls/policy_strict.conf;
        ssl_certificate         /etc/letsencrypt/live/cleberg.dev/fullchain.pem;
        ssl_certificate_key     /etc/letsencrypt/live/cleberg.dev/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/cleberg.dev/chain.pem;
        return 301 $scheme://cleberg.dev$request_uri;
}


server {
        listen 443 ssl;
        http2 on;
        server_name cleberg.dev;
        root /var/www/cleberg.dev/;
        include custom.d/tls/ssl_engine.conf;
        include custom.d/tls/policy_strict.conf;
        include custom.d/basic.conf;
        ssl_certificate         /etc/letsencrypt/live/cleberg.dev/fullchain.pem;
        ssl_certificate_key     /etc/letsencrypt/live/cleberg.dev/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/cleberg.dev/chain.pem;
        location / { try_files $uri $uri/ =404; }
}

server {
        listen 80;
        server_name www.cleberg.dev cleberg.dev;
        return 301 https://cleberg.dev$request_uri;
}
