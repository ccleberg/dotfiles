server {
	listen 443 ssl;
	http2 on;
	server_name slash.zerolabs.sh svfj2zs33g572utlou6kx7uamhwen4nxdzvfetnhwjqs4mmdgoayc7qd.onion;
	add_header Onion-Location "http://svfj2zs33g572utlou6kx7uamhwen4nxdzvfetnhwjqs4mmdgoayc7qd.onion$request_uri" always;
	include custom.d/tls/ssl_engine.conf;
	include custom.d/tls/certificate_files_cleberg_net.conf;
	include custom.d/tls/policy_strict.conf;
	include custom.d/basic.conf;
	location / {
		proxy_pass $backend_address;
		include custom.d/reverse_proxy/basic.conf;
	}
	include custom.d/security/robots_index_only.conf;
}

server {
    listen 80;
    server_name slash.zerolabs.sh;
    return 301 https://slash.zerolabs.sh$request_uri;
}

server {
    listen 80;
    server_name slash.cleberg.net;
    return 301 https://slash.zerolabs.sh$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name slash.cleberg.net;

    include custom.d/tls/ssl_engine.conf;
    include custom.d/tls/certificate_files_cleberg_net.conf;
    include custom.d/tls/policy_strict.conf;

    return 301 https://slash.zerolabs.sh$request_uri;
}
